apiVersion: 'metadata-service.resource.api.sap/v6alpha1'
type: 'MetadataType'
metadata:
  name: 'overlaypatch'
  path: '/sap/core/ucl/metadata/ord/v1'
  labels: {}
spec:
  typeName: 'OverlayPatch'
  key:
    - 'id'
  visibility: 'public'
  embedded: true
  description: 'A single patch action to apply to the element identified by the selector.'
  metadataProperties:
    - name: 'id'
      type: 'guid'
      mandatory: true
      unique: true
      description: 'UMS ID (globally unique), used for relations.'
    - name: 'description'
      type: 'string'
      description: "Optional human-readable note explaining the purpose or rationale of this individual patch.\nThis field is purely informational and has no effect on patch application.\n\nTypical use-cases:\n- Reviewer / audit notes explaining why a particular element is being modified.\n- Commit-message style annotations generated by AI tooling (e.g. \"Enriched summary for GetUser operation\").\n- References to tickets or decisions that motivated the change.\n\nMaps 1:1 to the `actions[].description` field in the\n[OpenAPI Overlay spec](https://spec.openapis.org/overlay/v1.1.0.html), enabling lossless\nround-trip conversion between OpenAPI overlays and ORD overlays."
    - name: 'action'
      type: 'string'
      description: "The patch operation to perform on the selected element:\n\n- `update`: Replace the selected element entirely with `data`.\n- `append`:\n  - When `data` is a string: append it to the selected string value.\n    Only valid when the selected element is a text/string field.\n  - When `data` is an object: recursively append each string property in `data`\n    to the corresponding string field in the selected object.\n    Nested objects are traversed; arrays in `data` are appended to matching arrays.\n    Throws an error if a string in `data` targets a non-string field in the target.\n  - Useful to extend existing descriptions, summaries, or other text fields\n    without replacing them entirely.\n- `remove`:\n  - `data: {}` (empty object): remove the selected element from the document entirely.\n  - `data` with null-valued properties: remove only those fields (recursively).\n    Nested `null` values remove nested fields as well\n    (JSON Merge Patch-style delete semantics).\n\nExample for partial removal:\n`data: { \"foo\": { \"bar\": null } }` removes only `foo.bar` inside the selected element.\nTo remove the entire selected element, use `data: {}`.\n- `merge`:\n  - objects are deep-merged recursively.\n  - scalar values are overwritten by the value from `data`.\n  - arrays are appended (new array items are added after existing items).\n  - existing object properties not mentioned in `data` are preserved.\n\n  To fully replace an array, use two ordered patches:\n  1. `remove` the array at the selected location.\n  2. `merge` the new array content."
      mandatory: true
    - name: 'tags'
      type: 'string'
      array: true
      description: "String labels associated with the patched element.\nUseful for classification, domain tagging, and filtering in registries or tooling.\n\nThese are purely informational and have no effect on patch application or on the\ntarget document."
  customTypeDefinitions: []
  metadataRelations:
    - propertyName: 'selector'
      relatedTypeName: 'OverlaySelector'
      relatedTypeNamespace: '/sap/core/ucl/metadata/ord/v1'
      mandatory: true
    - propertyName: 'data'
      relatedTypeName: 'OverlayPatchValue'
      relatedTypeNamespace: '/sap/core/ucl/metadata/ord/v1'
      mandatory: true
    - propertyName: 'meta'
      relatedTypeName: 'OverlayPatchMeta'
      relatedTypeNamespace: '/sap/core/ucl/metadata/ord/v1'
