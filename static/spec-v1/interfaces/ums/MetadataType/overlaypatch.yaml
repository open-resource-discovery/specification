apiVersion: 'metadata-service.resource.api.sap/v6alpha1'
type: 'MetadataType'
metadata:
  name: 'overlaypatch'
  path: '/sap/core/ucl/metadata/ord/v1'
  labels: {}
spec:
  typeName: 'OverlayPatch'
  key:
    - 'id'
  visibility: 'public'
  embedded: true
  description: 'A single patch action to apply to the element identified by the selector.'
  metadataProperties:
    - name: 'id'
      type: 'guid'
      mandatory: true
      unique: true
      description: 'UMS ID (globally unique), used for relations.'
    - name: 'description'
      type: 'string'
      description: "Optional human-readable note explaining the purpose or rationale of this individual patch.\nThis field is purely informational and has no effect on patch application.\n\nTypical use-cases:\n- Reviewer / audit notes explaining why a particular element is being modified.\n- Commit-message style annotations generated by AI tooling (e.g. \"Enriched summary for GetUser operation\").\n- References to tickets or decisions that motivated the change.\n\nMaps 1:1 to the `actions[].description` field in the\n[OpenAPI Overlay spec](https://spec.openapis.org/overlay/v1.1.0.html), enabling lossless\nround-trip conversion between OpenAPI overlays and ORD overlays."
    - name: 'action'
      type: 'string'
      description: 'The patch operation to perform on the selected element.'
      mandatory: true
    - name: 'tags'
      type: 'string'
      array: true
      description: "String labels associated with the patched element.\nUseful for classification, domain tagging, and filtering in registries or tooling.\n\nThese are purely informational and have no effect on patch application or on the\ntarget document."
  customTypeDefinitions: []
  metadataRelations:
    - propertyName: 'selector'
      relatedTypeName: 'OverlaySelector'
      relatedTypeNamespace: '/sap/core/ucl/metadata/ord/v1'
      mandatory: true
    - propertyName: 'data'
      relatedTypeName: 'OverlayPatchValue'
      relatedTypeNamespace: '/sap/core/ucl/metadata/ord/v1'
      description: "The value used by the patch action. REQUIRED for all actions.\n\nThe interpretation of this value depends on the `action` field.\nSee each action's description for details on how `data` is used."
      mandatory: true
    - propertyName: 'meta'
      relatedTypeName: 'OverlayMeta'
      relatedTypeNamespace: '/sap/core/ucl/metadata/ord/v1'
      description: "Optional arbitrary metadata associated with this specific patch for use by overlay consumers, tooling, and registries.\nThe contents of this block are **never applied to the target document** — they are strictly out-of-band and ignored by the patch merge process.\n\nUse this to carry information that enrichment sources associate with a specific patched element\nbut that has no standard representation in the target metadata format."
