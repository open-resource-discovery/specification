apiVersion: 'metadata-service.resource.api.sap/v6alpha1'
type: 'MetadataType'
metadata:
  name: 'overlaypatchvalue'
  path: '/sap/core/ucl/metadata/ord/v1'
  labels: {}
spec:
  typeName: 'OverlayPatchValue'
  key:
    - 'id'
  visibility: 'public'
  embedded: true
  description: "The value to be used together with patch actions:\n- with `action: append`:\n  - string value appended to selected text field\n- with `action: merge`:\n  - objects are deep-merged recursively\n  - scalar values overwrite existing values\n  - arrays are appended to existing arrays\n- with `action: update`, it replaces the selected element entirely\n- with `action: remove`:\n  - if omitted, the selected element is removed entirely\n  - if provided, fields set to `null` are deleted (recursively, including nested fields;\n    JSON Merge Patch-style delete semantics)\n\nTo fully replace an existing array, use two ordered patches:\n1. remove the array\n2. merge the new array value\n\nThis is a free-form value whose structure depends on the target being patched."
  metadataProperties:
    - name: 'id'
      type: 'guid'
      mandatory: true
      unique: true
      description: 'UMS ID (globally unique), used for relations.'
  customTypeDefinitions: []
  metadataRelations: []
