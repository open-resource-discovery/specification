apiVersion: 'metadata-service.resource.api.sap/v6alpha1'
type: 'MetadataType'
metadata:
  name: 'selector'
  path: '/sap/core/ucl/metadata/ord/v1'
  labels: {}
spec:
  typeName: 'Selector'
  key:
    - 'id'
  visibility: 'public'
  embedded: true
  description: "Identifies the element in the target to patch.\nExactly one selector type is used per patch. The selector object uses one explicit key:\n\n- `ordId`: resource level - targets an ORD resource (API, Event, Data Product, ...)\n- `operation`: operation level - targets an operation by its concept-level ID\n- `entityType`: entity type level - targets an entity/type by its concept-level ID\n- `propertyType`: property type level - targets a property/element within an entity type\n- `jsonPath`: generic fallback - targets any location in a JSON/YAML-based target document by path\n\nPrefer concept-level selectors (operation, entityType, propertyType) over jsonPath\nwhere possible, as they are resilient to structural changes in the target format."
  metadataProperties:
    - name: 'id'
      type: 'guid'
      mandatory: true
      unique: true
      description: 'UMS ID (globally unique), used for relations.'
  customTypeDefinitions: []
  metadataRelations: []
