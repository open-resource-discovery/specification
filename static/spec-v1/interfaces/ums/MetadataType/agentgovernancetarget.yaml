apiVersion: 'metadata-service.resource.api.sap/v6alpha1'
type: 'MetadataType'
metadata:
  name: 'agentgovernancetarget'
  path: '/sap/core/ucl/metadata/ord/v1'
  labels: {}
spec:
  typeName: 'AgentGovernanceTarget'
  key:
    - 'id'
  visibility: 'public'
  embedded: true
  description: "The resource this governance record applies to.\n\nThis can reference an [Agent](../../spec-v1/interfaces/Document.md#agent) resource\nor an [API Resource](../../spec-v1/interfaces/Document.md#api-resource) of type MCP server."
  metadataProperties:
    - name: 'id'
      type: 'guid'
      mandatory: true
      unique: true
      description: 'UMS ID (globally unique), used for relations.'
    - name: 'ordId'
      type: 'string'
      description: '[ORD ID](../../spec-v1/index.md#ord-id) of the governed agent or MCP server.'
      mandatory: true
      constraints:
        maxLength: 255
        pattern: '^([a-z0-9]+(?:[.][a-z0-9]+)*):(agent|apiResource):([a-zA-Z0-9._\-]+):(v0|v[1-9][0-9]*)$'
  customTypeDefinitions: []
  metadataRelations: []
