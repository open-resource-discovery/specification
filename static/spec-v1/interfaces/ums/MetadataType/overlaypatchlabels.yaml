apiVersion: 'metadata-service.resource.api.sap/v6alpha1'
type: 'MetadataType'
metadata:
  name: 'overlaypatchlabels'
  path: '/sap/core/ucl/metadata/ord/v1'
  labels: {}
spec:
  typeName: 'OverlayPatchLabels'
  key:
    - 'id'
  visibility: 'public'
  embedded: true
  description: "Key/value labels following the ORD labels convention.\nEach key maps to an array of string values.\n\nLabels can be used to attach structured categorization information to a patch\nthat cannot be expressed natively in the target metadata formats."
  metadataProperties:
    - name: 'id'
      type: 'guid'
      mandatory: true
      unique: true
      description: 'UMS ID (globally unique), used for relations.'
    - name: 'key'
      type: 'string'
    - name: 'value'
      type: 'string'
  customTypeDefinitions: []
  metadataRelations: []
