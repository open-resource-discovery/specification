apiVersion: 'metadata-service.resource.api.sap/v6alpha1'
type: 'MetadataType'
metadata:
  name: 'overlayselectorbypropertytype'
  path: '/sap/core/ucl/metadata/ord/v1'
  labels: {}
spec:
  typeName: 'OverlaySelectorByPropertyType'
  key:
    - 'id'
  visibility: 'public'
  embedded: true
  metadataProperties:
    - name: 'id'
      type: 'guid'
      mandatory: true
      unique: true
      description: 'UMS ID (globally unique), used for relations.'
    - name: 'propertyType'
      type: 'string'
      description: "Concept-level property/element identifier.\nSupported metadata formats:\n- `edmx` (OData v2/v4 CSDL XML): targets a Property or NavigationProperty on an EntityType\n  or ComplexType. Use the unqualified property name (e.g. `BirthDate`).\n- `csdl-json` (OData v4 CSDL JSON): same resolution as `edmx`.\n- `sap-csn-interop-effective-v1` (CSN Interop): targets an entry in the `elements` map of\n  the matched entity definition. Use the element name as defined (e.g. `AirlineID`, `Name`).\n\nIf the property/element name is unique across all types in the document, this field alone\nis sufficient. If it is ambiguous (same name on multiple types), provide `entityType`\nto disambiguate — which is RECOMMENDED for CSN Interop since element names like `Name`\nare commonly repeated across entities."
      mandatory: true
      constraints:
        minLength: 1
    - name: 'entityType'
      type: 'string'
      description: "Optional entity type context for the selected property.\nProperty names are always unqualified (e.g. `BirthDate`, `AirlineID`).\nQualification is achieved by pairing with `entityType`, which SHOULD always be provided\nto avoid ambiguity when the same property name exists on multiple types.\n- For OData: the namespace-qualified EntityType or ComplexType name (e.g. `OData.Demo.Customer`).\n- For CSN Interop: the fully qualified `definitions` key of the containing entity\n  (e.g. `AirlineService.Airline`)."
      mandatory: true
      constraints:
        minLength: 1
  customTypeDefinitions: []
  metadataRelations: []
