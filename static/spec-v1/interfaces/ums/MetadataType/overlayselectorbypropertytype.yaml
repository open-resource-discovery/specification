apiVersion: 'metadata-service.resource.api.sap/v6alpha1'
type: 'MetadataType'
metadata:
  name: 'overlayselectorbypropertytype'
  path: '/sap/core/ucl/metadata/ord/v1'
  labels: {}
spec:
  typeName: 'OverlaySelectorByPropertyType'
  key:
    - 'id'
  visibility: 'public'
  embedded: true
  metadataProperties:
    - name: 'id'
      type: 'guid'
      mandatory: true
      unique: true
      description: 'UMS ID (globally unique), used for relations.'
    - name: 'propertyType'
      type: 'string'
      description: "Concept-level property/element identifier.\nSupported metadata formats:\n- `edmx` (OData v2/v4 CSDL XML): targets a Property or NavigationProperty on an EntityType\n  or ComplexType. Use the unqualified property name (e.g. `BirthDate`).\n- `csdl-json` (OData v4 CSDL JSON): same resolution as `edmx`.\n- `sap-csn-interop-effective-v1` (CSN Interop): targets an entry in the `elements` map of\n  the matched entity definition. Use the element name as defined (e.g. `AirlineID`, `Name`).\n\n`entityType` MUST always accompany this field to unambiguously identify the owning type.\nProperty names are unqualified and frequently reused across entity types (e.g. `Name`,\n`Description`, `CreatedAt`), so `propertyType` alone is not a reliable unique selector."
      mandatory: true
      constraints:
        minLength: 1
    - name: 'entityType'
      type: 'string'
      description: "Required entity type context for the selected property.\nBecause property names are unqualified and commonly repeated across entity types\n(e.g. `Name`, `Description`, `CreatedAt`), `entityType` is mandatory to ensure\nthe selector is unambiguous and stable across schema evolution.\n- For OData: the namespace-qualified EntityType or ComplexType name (e.g. `OData.Demo.Customer`).\n- For CSN Interop: the fully qualified `definitions` key of the containing entity\n  (e.g. `AirlineService.Airline`)."
      mandatory: true
      constraints:
        minLength: 1
  customTypeDefinitions: []
  metadataRelations: []
