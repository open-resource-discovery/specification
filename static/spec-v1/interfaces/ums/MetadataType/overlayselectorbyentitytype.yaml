apiVersion: 'metadata-service.resource.api.sap/v6alpha1'
type: 'MetadataType'
metadata:
  name: 'overlayselectorbyentitytype'
  path: '/sap/core/ucl/metadata/ord/v1'
  labels: {}
spec:
  typeName: 'OverlaySelectorByEntityType'
  key:
    - 'id'
  visibility: 'public'
  embedded: true
  metadataProperties:
    - name: 'id'
      type: 'guid'
      mandatory: true
      unique: true
      description: 'UMS ID (globally unique), used for relations.'
    - name: 'entityType'
      type: 'string'
      description: "Concept-level entity or enum type identifier.\nSupported metadata formats:\n- `edmx` (OData v2/v4 CSDL XML): targets EntityType, ComplexType, or EnumType elements\n  declared in the Schema. MUST use the namespace-qualified name (e.g. `OData.Demo.Customer`).\n  For EntitySet-level patching (Capabilities annotations), use the `entitySet` selector instead.\n- `csdl-json` (OData v4 CSDL JSON): same name resolution as `edmx`. Resolves elements\n  with `$Kind` equal to `EntityType`, `ComplexType`, or `EnumType`.\n- `sap-csn-interop-effective-v1` (CSN Interop): targets a `definitions` entry by its\n  fully qualified key (e.g. `AirlineService.Airline`). In CSN Interop the key is always\n  fully qualified, so the fully qualified form MUST be used.\n\nWhen targeting an EnumType to patch its members individually,\nuse this selector as the `entityType` context within a `propertyType` selector."
      mandatory: true
      constraints:
        minLength: 1
  customTypeDefinitions: []
  metadataRelations: []
