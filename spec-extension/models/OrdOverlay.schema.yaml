$schema: "http://json-schema.org/draft-07/schema#"
$id: https://open-resource-discovery.org/spec-extension/models/OrdOverlay.schema.json#
title: ORD Overlay
x-status: alpha
description: |-
  ⚠️ ALPHA: This specification is in alpha and subject to change.

  The ORD Overlay is an optional ORD model extension.

  It allows patching both ORD resources and referenced resource definition files (e.g. OpenAPI,
  AsyncAPI, OData CSDL, MCP Agent Cards) without modifying the original source files.

  Overlay files can be provided through the ORD configuration endpoint
  (https://open-resource-discovery.org/spec-v1/index#ord-configuration-endpoint),
  or attached as `resourceDefinitions` entries on API or Event resources with type `ord:overlay:v1`.

  Patches use concept-level selectors that are independent of the internal structure of the target format,
  making overlays resilient to format changes (e.g. OpenAPI 3.0 → 3.1, OData CSDL JSON → XML).
  A JSON Path selector is available as a generic fallback for any JSON/YAML-based target format.

  Conceptual selector levels (from high to low):
    - Resource level: ORD ID (resolved via the ORD registry)
    - Operation level: operation (OpenAPI `operationId`, MCP tool `name`)
    - Entity type level: entityType (OData EntityType)
    - Property type level: propertyType (OData Property scoped by entity type)
    - Generic fallback: jsonPath (any JSON/YAML document, structure-bound)

  Selector support by metadata format:
    - `operation`: OpenAPI (`openapi-v2`, `openapi-v3`, `openapi-v3.1+`) and MCP (identified via a Specification ID in `definitionType`).
    - `entityType` and `propertyType`: OData (`edmx` for v2/v4, `csdl-json` for v4).
    - `jsonPath`: any JSON/YAML-based metadata file (including OpenAPI and MCP files).
    - `ordId`: ORD resource metadata level (patching ORD resources themselves).

  Validation assumption:
    - overlays and overlay application assume the selected target document is already valid
      for its native metadata format.
    - the merge process does not fully validate all target metadata formats.
    - the merged output should be validated again with the corresponding format-specific tooling.
x-ums-type: root
type: object

properties:
  $schema:
    type: string
    format: uri-reference
    description: |-
      Optional [URL](https://tools.ietf.org/html/rfc3986) to the ORD Overlay schema (defined as a JSON Schema).
      If provided, this enables code intelligence and validation in supported editors (like VSCode) and tools.
    anyOf:
      - type: string
        format: uri-reference
      - const: "https://open-resource-discovery.org/spec-extension/models/OrdOverlay.schema.json#"

  ordOverlay:
    type: string
    description: Version of the ORD Overlay specification.
    enum:
      - "0.1"
    examples:
      - "0.1"

  ordId:
    type: string
    maxLength: 255
    pattern: ^([a-z0-9]+(?:[.][a-z0-9]+)*):(overlay):([a-zA-Z0-9._\-]+):(v0|v[1-9][0-9]*)$
    description: |-
      Optional ORD ID of this overlay document.
      MUST be provided if the ORD Overlay is published via ORD Configuration endpoint.
    examples:
      - "sap.foo:overlay:astronomy-api-openapi:v1"

  description:
    type: string
    minLength: 1
    description: |-
      Optional description of the overlay document itself.

      Notated in [CommonMark](https://spec.commonmark.org/) (Markdown).
    examples:
      - |
        This overlay adds descriptive metadata for AI use-cases
        without modifying the original resource definition.

  perspective:
    $ref: "#/definitions/OverlayPerspective"
    description: |-
      Overlay-specific [perspective](../../spec-v1/index.md#perspectives) that scopes where this overlay should be applied.

      Use this together with `describedSystemType`, `describedSystemVersion`, and `describedSystemInstance`
      to describe whether the overlay applies broadly to a system type, to one released system version,
      or only to a specific system instance.

  describedSystemType:
    $ref: "#/definitions/OverlaySystemType"
    description: |-
      Information on the [system type](../../spec-v1/index.md#system-type) this overlay describes.
      This is the primary context object for `perspective: system-type`, and also the parent context
      for more specific `system-version` and `system-instance` overlays.

  describedSystemVersion:
    $ref: "#/definitions/OverlaySystemVersion"
    description: |-
      Information on the [system version](../../spec-v1/index.md#system-version) this overlay describes.
      Use this when the overlay should only patch metadata for one specific released system version.

  describedSystemInstance:
    $ref: "#/definitions/OverlaySystemInstance"
    description: |-
      Information on the [system instance](../../spec-v1/index.md#system-instance) this overlay describes.
      Use this when the overlay should only patch metadata for one concrete tenant / runtime instance.

  visibility:
    $ref: "#/definitions/OverlayVisibility"

  target:
    description: |-
      Optional target context for this overlay.
      The target can reference an ORD resource or a referenced resource definition file.

      `ordId` selects the ORD resource metadata itself.
      If patches are intended for a specific attached metadata definition file, `ordId` alone can be ambiguous
      when the resource exposes multiple definitions.
      In that case, use `url` and/or `definitionType` to clarify the intended file.

      Example: an OData API resource may provide both `edmx` and `openapi-v3` definitions.
      Use `definitionType` and/or an explicit `url` to identify which one is patched.

      For overlays that only patch ORD-level metadata via patch selectors (`selector.ordId`),
      a `target.ordId` is often not needed. In that case, `target` may be omitted entirely,
      or provided as an empty object for informational purposes.
      Multiple resources can still be patched by defining multiple patches with different selector `ordId` values.

      If the ORD document URL is known, it can be provided via `target.url` as additional context.
    $ref: "#/definitions/OverlayTarget"

  patches:
    type: array
    minItems: 1
    description: |-
      Ordered sequence of patches to apply to the targeted resource(s).
      Patches are applied in the order listed.
    items:
      $ref: "#/definitions/OverlayPatch"

required:
  - ordOverlay
  - patches

definitions:
  # Based on the ORD Document Correlation ID item shape; ORD Document schema is leading for the shared format constraints.
  OverlayCorrelationId:
    type: string
    title: Overlay Correlation ID
    x-ums-type: "ignore"
    description: |-
      Correlation ID identifying related records in external systems of record.
      MUST be a valid [Correlation ID](../../spec-v1/index.md#correlation-id).
    pattern: ^([a-z0-9]+(?:[.][a-z0-9]+)*):([a-zA-Z0-9._\-\/]+):([a-zA-Z0-9._\-\/]+)$
    maxLength: 255

  # Based on ORD Document resource definition type values and Specification ID usage; ORD Document schema is leading for the reused values and constraints.
  OverlayDefinitionType:
    type: string
    title: Overlay Definition Type
    x-ums-type: "ignore"
    description: |-
      Type of the targeted metadata definition file.
      This can be used to disambiguate how selectors are interpreted for the target.

      MUST be either:
      - any valid [Specification ID](../../spec-v1/index.md#specification-id), or
      - one of the pre-defined values reused from:
        - API Resource Definition `type`
        - Event Resource Definition `type`
        - Capability Definition `type`

      The literal value `custom` is deprecated for `definitionType` and MUST NOT be used.
      In such cases, use a concrete [Specification ID](../../spec-v1/index.md#specification-id) instead.
    anyOf:
      - type: string
        pattern: ^([a-z0-9]+(?:[.][a-z0-9]+)*):([a-zA-Z0-9._\-]+):(v0|v[1-9][0-9]*)$
        description: |-
          Any valid [Specification ID](../../spec-v1/index.md#specification-id).
      - const: openapi-v2
      - const: openapi-v3
      - const: openapi-v3.1+
      - const: raml-v1
      - const: edmx
      - const: csdl-json
      - const: graphql-sdl
      - const: wsdl-v1
      - const: wsdl-v2
      - const: a2a-agent-card
      - const: sap-rfc-metadata-v1
      - const: sap-sql-api-definition-v1
      - const: sap-csn-interop-effective-v1
      - const: asyncapi-v2
      - const: sap.mdo:mdi-capability-definition:v1
      - const: ord:overlay:v1
    examples:
      - "openapi-v3"
      - "asyncapi-v2"
      - "sap.mdo:mdi-capability-definition:v1"

  # Based on the ORD Document shared visibility definition; ORD Document schema is leading for the shared values and semantics, while this overlay variant adapts the wording to overlays.
  OverlayVisibility:
    type: string
    title: Overlay Visibility
    x-ums-type: "ignore"
    description: |-
      Defines metadata access control - which categories of consumers are allowed to discover and access the resource and its metadata.

      This controls who can see that the resource exists and retrieve its metadata level information.
      It does NOT control runtime access to the resource itself - that is managed separately through authentication and authorization mechanisms.

      Use this to prevent exposing internal implementation details to inappropriate consumer audiences.
    oneOf:
      - const: public
        description: |-
          The overlay can be discovered and accessed by anyone, including customers, partners, and unauthenticated external parties.

      - const: internal
        description: |-
          The overlay can only be discovered and accessed by vendor internal consumers (e.g. applications or services of the same vendor).
          MUST NOT be made available to external parties or vendor customers.

      - const: private
        description: |-
          The overlay should not be discoverable outside the application / service's own deployment scope (e.g., outside of the provider application or the same system namespace / system type).

  # Based on the ORD Document `perspective` field; ORD Document schema is leading for the shared values and core semantics, while this overlay variant narrows the meaning to overlay application scope.
  OverlayPerspective:
    type: string
    title: Overlay Perspective
    x-ums-type: "ignore"
    description: |-
      Declares from which system landscape perspective this overlay is meant to be applied.

      Unlike an ORD Document perspective, an overlay perspective scopes where the patch content should be consumed:
      - `system-type`: patch the targeted resource metadata across the system type in general.
      - `system-version`: patch the targeted resource metadata only for one released system version.
      - `system-instance`: patch the targeted resource metadata only for one concrete system instance / tenant.

      Use this together with `describedSystemType`, `describedSystemVersion`, and `describedSystemInstance`
      to make the intended overlay scope explicit.
    oneOf:
      - const: "system-type"
        description: |-
          Applies the overlay at system-type level.

          Use this when the overlay should patch the same targeted resource across versions and instances
          of the same system type, typically for the same ORD resource major version.
          `describedSystemType` SHOULD be provided as the identifying context.
      - const: "system-version"
        description: |-
          Applies the overlay to one concrete system version.

          Use this when metadata differs between released versions and the patch should only affect
          a specific version of the target resource.
          `describedSystemVersion` SHOULD be provided, and `describedSystemType` SHOULD also be provided as parent context.
      - const: "system-instance"
        description: |-
          Applies the overlay to one concrete system instance / tenant.

          Use this when the patch reflects tenant-specific configuration, extensions, or runtime differences
          in the target metadata.
          `describedSystemInstance` SHOULD be provided.
    examples:
      - "system-type"
      - "system-version"
      - "system-instance"

  # Copy from ORD Document definition "SystemInstance"; ORD Document schema is leading and this copy MUST be kept in sync for the shared fields.
  OverlaySystemInstance:
    type: object
    title: Overlay System Instance
    x-ums-type: "ignore"
    description: |-
      A [system instance](../../spec-v1/index.md#system-instance) is a concrete, running instance of a system type.
    properties:
      baseUrl:
        type: string
        format: uri-reference
        description: |-
          Optional [base URL](../../spec-v1/index.md#base-url) of the system instance.
          By providing the base URL, relative URLs in the overlay are resolved relative to it.
        pattern: ^http[s]?:\/\/[^:\/\s]+\.[^:\/\s\.]+(:\d+)?(\/[a-zA-Z0-9-\._~]+)*$
        examples:
          - "https://example-sap-system.com"
          - "https://sub.foo.bar.com/api/v1"

      localId:
        type: string
        description: |-
          Optional local ID for the system instance, as known by the described system.
        maxLength: 255
        examples:
          - "LocalTenantId123"

      correlationIds:
        type: array
        description: |-
          Correlation IDs for linking this system instance to external systems of record.
        minItems: 1
        items:
          $ref: "#/definitions/OverlayCorrelationId"
        examples:
          - ["sap.cld:tenant:741234567"]
    additionalProperties: false

  # Copy from ORD Document definition "SystemType"; ORD Document schema is leading and this copy MUST be kept in sync for the shared fields.
  OverlaySystemType:
    type: object
    title: Overlay System Type
    x-ums-type: "ignore"
    description: |-
      A [system type](../../spec-v1/index.md#system-type) is the abstract type of an application or service, from operational perspective.
    properties:
      systemNamespace:
        type: string
        description: |-
          The [system namespace](../../spec-v1/index.md#system-namespace) is a unique identifier for the system type.
        pattern: ^[a-z0-9]+(?:[.][a-z0-9]+){1}$
        maxLength: 32
        examples:
          - "sap.s4"
          - "sap.c4c"
          - "sap.cld"

      correlationIds:
        type: array
        description: |-
          Correlation IDs for linking this system type to external systems of record.
        minItems: 1
        items:
          $ref: "#/definitions/OverlayCorrelationId"
        examples:
          - ["sap.cld:systemRole:S4_PC"]
    additionalProperties: false

  # Copy from ORD Document definition "SystemVersion"; ORD Document schema is leading and this copy MUST be kept in sync for the shared fields.
  OverlaySystemVersion:
    type: object
    title: Overlay System Version
    x-ums-type: "ignore"
    description: |-
      A [system version](../../spec-v1/index.md#system-version) describes a version/release of the system.
    properties:
      version:
        type: string
        description: |-
          The version of the system instance (run-time) or the version of the described system-version perspective.

          It MUST follow the [Semantic Versioning 2.0.0](https://semver.org/) standard.
        pattern: ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$
        examples:
          - "1.2.3"
          - "2024.8.0"

      title:
        type: string
        minLength: 1
        maxLength: 255
        description: Human-readable title of the system version.
        examples:
          - "SAP S/4HANA Cloud 2408"

      correlationIds:
        type: array
        description: |-
          Correlation IDs for linking this system version to external systems of record.
        minItems: 1
        items:
          $ref: "#/definitions/OverlayCorrelationId"
        examples:
          - ["sap.cld:release:2408"]
    additionalProperties: false

  OverlayTarget:
    type: object
    title: Overlay Target
    x-ums-type: "embedded"
    description: |-
      Optional context about the target being patched.
      The target can refer to an ORD resource or to a referenced resource definition file.

      `ordId` targets the ORD resource metadata itself.
      For patching a specific resource definition file of that resource, use `url` and/or `definitionType`
      to disambiguate.

      Example: one OData API resource can have both `edmx` and `openapi-v3` definitions attached.
      In such cases, provide `definitionType` and/or `url` to make the concrete patch target explicit.

      For ORD-level-only overlays, this object can be omitted (or left empty) and
      selectors can directly identify resources via `selector.ordId`.
      Multiple identifiers, if provided, are treated as all pointing to the same resource.
    additionalProperties: false
    properties:
      ordId:
        type: string
        description: |-
          ORD ID of the target being patched (e.g. an API Resource, Event Resource, Data Product).
          MUST be a valid [ORD ID](../../spec-v1/index.md#ord-id).
        pattern: ^([a-z0-9]+(?:[.][a-z0-9]+)*):([a-zA-Z0-9._\-]+):([a-zA-Z0-9._\-]+):(v0|v[1-9][0-9]*)$
        maxLength: 255
        examples:
          - "sap.s4:apiResource:OP_API_BUSINESS_PARTNER_SRV:v1"
      url:
        type: string
        format: uri-reference
        description: |-
          URL or URI pointing directly to the file being patched.
          This is typically a resource definition file (e.g. OpenAPI, AsyncAPI, OData CSDL),
          but can also point to any JSON/YAML-based target document.
        examples:
          - "https://example.com/api/openapi.json"
          - "./openapi.yaml"
      correlationIds:
        type: array
        minItems: 1
        description: |-
          Correlation IDs referencing the target resource in external registries or systems of record.
          Reuses the ORD correlation ID format: `namespace:type:localId`.
          All listed IDs are treated as pointing to the same resource.
        items:
          type: string
          pattern: ^([a-z0-9]+(?:[.][a-z0-9]+)*):([a-zA-Z0-9._\-\/]+):([a-zA-Z0-9._\-\/]+)$
          maxLength: 255
        examples:
          - ["sap.s4:communicationScenario:SAP_COM_0008"]
      definitionType:
        $ref: "#/definitions/OverlayDefinitionType"
        description: |-
          Optional, but RECOMMENDED type of the target definition being patched.
          If provided, this SHOULD match the `type` of the referenced metadata definition
          (as used in API/Event/Capability resource definitions).
          This is especially useful when `ordId` resolves to a resource with multiple attached definitions.

  OverlayPatch:
    type: object
    title: Overlay Patch
    x-ums-type: "embedded"
    description: A single patch action to apply to the element identified by the selector.
    required:
      - action
      - selector
    properties:
      action:
        type: string
        description: |-
          The patch operation to perform on the selected element:

          - `update`: Replace the selected element entirely with `data`.
          - `append`:
            - append string `data` to the selected string value.
            - only valid when the selected element is a text/string field.
            - useful to extend existing descriptions without replacing them.
          - `merge`:
            - objects are deep-merged recursively.
            - scalar values are overwritten by the value from `data`.
            - arrays are appended (new array items are added after existing items).
            - existing object properties not mentioned in `data` are preserved.

            To fully replace an array, use two ordered patches:
            1. `remove` the array at the selected location.
            2. `merge` the new array content.
          - `remove`:
            - without `data`: remove the selected element from the document entirely.
            - with `data`: remove fields that are set to `null`.
              This applies recursively, so nested `null` values remove nested fields as well
              (JSON Merge Patch-style delete semantics).

          Example for nested removal:
          `data: { "foo": { "bar": null } }` removes `foo.bar` inside the selected element.
        enum:
          - update
          - append
          - merge
          - remove

      selector:
        $ref: "#/definitions/OverlaySelector"

      data:
        $ref: "#/definitions/OverlayPatchValue"

  OverlaySelector:
    type: object
    title: Overlay Selector
    x-ums-type: "embedded"
    description: |-
      Identifies the element in the target to patch.
      Exactly one selector type is used per patch. The selector object uses one explicit key:

      - `ordId`: resource level - targets an ORD resource (API, Event, Data Product, ...)
      - `operation`: operation level - targets an operation by its concept-level ID
      - `entityType`: entity type level - targets an entity/type by its concept-level ID
      - `propertyType`: property type level - targets a property/element within an entity type
      - `jsonPath`: generic fallback - targets any location in a JSON/YAML-based target document by path

      Prefer concept-level selectors (operation, entityType, propertyType) over jsonPath
      where possible, as they are resilient to structural changes in the target format.
    oneOf:
      - $ref: "#/definitions/OverlaySelectorByJsonPath"
      - $ref: "#/definitions/OverlaySelectorByOrdId"
      - $ref: "#/definitions/OverlaySelectorByOperation"
      - $ref: "#/definitions/OverlaySelectorByEntityType"
      - $ref: "#/definitions/OverlaySelectorByPropertyType"

  OverlaySelectorByJsonPath:
    type: object
    title: Overlay Selector By JsonPath
    x-ums-type: "embedded"
    additionalProperties: false
    required:
      - jsonPath
    properties:
      jsonPath:
        type: string
        minLength: 1
        pattern: ^\$
        description: |-
          JSONPath expression targeting any location in a JSON/YAML-based target document.
          MUST start with `$`.
          This is the generic fallback selector and is supported for all JSON/YAML-based metadata formats,
          including OpenAPI and MCP metadata files.
        examples:
          - "$.paths./business-partners.get"

  OverlaySelectorByOrdId:
    type: object
    title: Overlay Selector By ORD ID
    x-ums-type: "embedded"
    additionalProperties: false
    required:
      - ordId
    properties:
      ordId:
        type: string
        description: |-
          ORD ID targeting an ORD resource (API, Event, Data Product, ...).
          MUST be a valid [ORD ID](../../spec-v1/index.md#ord-id).
          Use this selector when patching ORD resource metadata itself.
          The ORD resource type is derived from the ORD ID itself.
        pattern: ^([a-z0-9]+(?:[.][a-z0-9]+)*):([a-zA-Z0-9._\-]+):([a-zA-Z0-9._\-]+):(v0|v[1-9][0-9]*)$
        examples:
          - "sap.s4:apiResource:OP_API_BUSINESS_PARTNER_SRV:v1"

  OverlaySelectorByOperation:
    type: object
    title: Overlay Selector By Operation
    x-ums-type: "embedded"
    additionalProperties: false
    required:
      - operation
    properties:
      operation:
        type: string
        minLength: 1
        description: |-
          Concept-level operation identifier.
          Supported mappings by format:
          - OpenAPI (`openapi-v2`, `openapi-v3`, `openapi-v3.1+`): maps to the `operationId` field on
            an HTTP operation inside `paths.{path}.{method}`.
          - MCP (any Specification ID other than `a2a-agent-card`): maps to `tools[].name`.
            See: https://modelcontextprotocol.io/specification/2025-11-25/schema#tool-name
          - A2A Agent Card (`a2a-agent-card`): maps to `skills[].id`.
            See: https://google.github.io/A2A/specification/#agentskill-object

          When `definitionType` is not provided, the implementation tries OpenAPI paths first,
          then MCP tools, then A2A skills, returning the first match found.

          Not currently supported for OData selectors.
        examples:
          - "getBusinessPartner"
          - "dispute-case-resolution"

  OverlaySelectorByEntityType:
    type: object
    title: Overlay Selector By Entity Type
    x-ums-type: "embedded"
    additionalProperties: false
    required:
      - entityType
    properties:
      entityType:
        type: string
        minLength: 1
        description: |-
          Concept-level entity type identifier.
          Currently supported for OData metadata:
          - `edmx` (OData v2/v4 CSDL XML)
          - `csdl-json` (OData v4 CSDL JSON)
        examples:
          - "BusinessPartner"
          - "A_BusinessPartnerType"

  OverlaySelectorByPropertyType:
    type: object
    title: Overlay Selector By Property Type
    x-ums-type: "embedded"
    additionalProperties: false
    required:
      - propertyType
    properties:
      propertyType:
        type: string
        minLength: 1
        description: |-
          Concept-level property/element identifier.
          Currently supported for OData metadata:
          - `edmx` (OData v2/v4 CSDL XML)
          - `csdl-json` (OData v4 CSDL JSON)

          If the property type is globally unique in the targeted metadata, this field alone is sufficient.
          If it is ambiguous, `entityType` SHOULD be provided in addition to disambiguate the lookup.
        examples:
          - "BusinessPartnerFullName"
          - "LegacySearchTerm1"
      entityType:
        type: string
        minLength: 1
        description: |-
          Optional entity type context of the selected property.
          Provide this when `propertyType` alone is ambiguous.
          For OData metadata, this identifies the containing EntityType.
        examples:
          - "BusinessPartner"
          - "A_BusinessPartnerType"

  # Intended shape: unconstrained value (`unknown` / `any`) because patch data depends on the selected target.
  # Current fallback: explicit JSON-type union because spec-toolkit currently rejects a typeless schema object here.
  # TODO: Consider extending spec-toolkit to support unconstrained value definitions and generate `unknown` cleanly.
  # TODO: Clarify how to best handle an unconstrained patch value in UMS.
  # TODO: Decide whether this has to remain its own definition with x-ums-type "embedded".
  OverlayPatchValue:
    type:
      - object
      - array
      - string
      - number
      - boolean
      - "null"
    title: Overlay Patch Value
    x-ums-type: "embedded"
    description: |-
      The value to be used together with patch actions:
      - with `action: append`:
        - string value appended to selected text field
      - with `action: merge`:
        - objects are deep-merged recursively
        - scalar values overwrite existing values
        - arrays are appended to existing arrays
      - with `action: update`, it replaces the selected element entirely
      - with `action: remove`:
        - if omitted, the selected element is removed entirely
        - if provided, fields set to `null` are deleted (recursively, including nested fields;
          JSON Merge Patch-style delete semantics)

      To fully replace an existing array, use two ordered patches:
      1. remove the array
      2. merge the new array value

      This is a free-form value whose structure depends on the target being patched.
