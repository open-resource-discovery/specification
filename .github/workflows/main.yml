name: Main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Installing Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install NPM dependencies
        run: npm ci

      - name: Generate
        run: npm run generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build-docusaurus
        env:
          BANNER_SERVER_BASE_URL: ${{vars.BANNER_SERVER_BASE_URL}}

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build
